name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: netpair
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: netpair/package-lock.json
      - run: npm ci
      - run: npm run build

  backend-check:
    name: Backend Syntax Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: netpair/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: netpair/backend/package-lock.json
      - run: npm ci
      - run: node --check server.js
